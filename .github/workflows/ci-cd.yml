name: CI-CD

on:
  push:
    branches:
      - main
      - phase-*
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            client-ui/package-lock.json
            admin-ui/package-lock.json
            backend-node/package-lock.json

      - name: Install API
        run: npm ci
        working-directory: backend-node

      - name: Build API
        run: npm run build
        working-directory: backend-node

      - name: Install client UI
        run: npm ci
        working-directory: client-ui

      - name: Build client UI
        run: npm run build
        working-directory: client-ui

      - name: Install admin UI
        run: npm ci
        working-directory: admin-ui

      - name: Build admin UI
        run: npm run build
        working-directory: admin-ui
